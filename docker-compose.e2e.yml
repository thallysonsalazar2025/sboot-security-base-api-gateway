version: "3.9"

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  sboot-security-base-auth-service:
    image: sboot-security-base-auth-service:latest
    container_name: sboot-security-base-auth-service
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - rabbitmq

  sboot-security-base-api-gateway:
    build:
      context: .
    container_name: sboot-security-base-api-gateway
    ports:
      - "8081:8081"
    environment:
      JWT_HS512_SECRET: ${JWT_HS512_SECRET:-YmFzaWNfY3JlZGVudGlhbC5zZWNyZXQta2V5LWZvci1zYWFzLWhvbGVyaXRlLWJmZi1nYXRld2F5}
      PAYROLL_QUERY_SERVICE_URL: http://sboot-payroll-query-service:8080
      LOG_ELASTICSEARCH_ENABLED: "true"
      LOG_ELASTICSEARCH_ENDPOINT: https://my-elasticsearch-project-f23ad4.es.us-central1.gcp.elastic.cloud:443
      LOG_ELASTICSEARCH_API_KEY: ${LOG_ELASTICSEARCH_API_KEY:-}
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - sboot-payroll-query-service
      - sboot-security-base-auth-service
      - rabbitmq

  sboot-payroll-query-service:
    image: sboot-payroll-query-service:latest
    container_name: sboot-payroll-query-service
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      PAYROLL_ORCHESTRATOR_URL: http://boot-payroll-orchestrator-service:8080
    depends_on:
      - boot-payroll-orchestrator-service
      - rabbitmq

  boot-payroll-orchestrator-service:
    image: boot-payroll-orchestrator-service:latest
    container_name: boot-payroll-orchestrator-service
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      PAYROLL_GENERATION_PUBLISHER_URL: http://payroll-generation-request-publisher:8080
      PAYROLL_VALIDATION_URL: http://sboot-payroll-validation-service:8080
      PAYROLL_CALCULATION_URL: http://sboot-payroll-calculation-service:8080
      PAYROLL_PROCESSOR_URL: http://sboot-payroll-generation-processor:8080
      PAYROLL_EVENTS_URL: http://sboot-payroll-events-service:8080
    depends_on:
      - payroll-generation-request-publisher
      - sboot-payroll-validation-service
      - sboot-payroll-calculation-service
      - sboot-payroll-generation-processor
      - sboot-payroll-events-service
      - rabbitmq

  payroll-generation-request-publisher:
    image: payroll-generation-request-publisher:latest
    container_name: payroll-generation-request-publisher
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - rabbitmq

  sboot-payroll-generation-processor:
    image: sboot-payroll-generation-processor:latest
    container_name: sboot-payroll-generation-processor
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      EMPLOYEE_SERVICE_URL: http://sboot-data-employe-serice:8080
      COMPANY_SERVICE_URL: http://sboot-data-company-serice:8080
      TIME_TRACKING_URL: http://sboot-time-tracking-integration-service:8080
    depends_on:
      - sboot-data-employe-serice
      - sboot-data-company-serice
      - sboot-time-tracking-integration-service
      - rabbitmq

  sboot-payroll-calculation-service:
    image: sboot-payroll-calculation-service:latest
    container_name: sboot-payroll-calculation-service
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - rabbitmq

  sboot-data-employe-serice:
    image: sboot-data-employe-serice:latest
    container_name: sboot-data-employe-serice

  sboot-data-company-serice:
    image: sboot-data-company-serice:latest
    container_name: sboot-data-company-serice

  sboot-payroll-events-service:
    image: sboot-payroll-events-service:latest
    container_name: sboot-payroll-events-service
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - rabbitmq

  sboot-payroll-validation-service:
    image: sboot-payroll-validation-service:latest
    container_name: sboot-payroll-validation-service
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
      EMPLOYEE_SERVICE_URL: http://sboot-data-employe-serice:8080
      COMPANY_SERVICE_URL: http://sboot-data-company-serice:8080
    depends_on:
      - sboot-data-employe-serice
      - sboot-data-company-serice
      - rabbitmq

  sboot-time-tracking-integration-service:
    image: sboot-time-tracking-integration-service:latest
    container_name: sboot-time-tracking-integration-service
    environment:
      SPRING_RABBITMQ_HOST: rabbitmq
    depends_on:
      - rabbitmq
