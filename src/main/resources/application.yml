server:
  port: 8080

spring:
  application:
    name: sboot-security-base-api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${IDENTITY_SERVICE_JWKS_URI:http://identity-service:8081/oauth2/jwks}
  cloud:
    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 10s
      default-filters:
        - RemoveRequestHeader=Cookie

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: never

gateway:
  rate-limit:
    max-requests-per-window: 100
    window-seconds: 60

logging:
  level:
    root: INFO
    com.example.gateway: INFO
